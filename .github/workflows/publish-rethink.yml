name: Publish knowledge collections

on:
  push:
    branches: [main]
    paths:
      - 'articles/rethink/**'
      - 'articles/resite/**'
      - '.github/workflows/publish-rethink.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble public site
        run: |
          mkdir -p public/resite
          mkdir -p public/articles/reread
          cp -R articles/rethink/. public/
          cp -R articles/resite/. public/resite/
          cp -R articles/reread/. public/articles/reread/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
